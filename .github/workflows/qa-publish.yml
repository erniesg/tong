name: Trusted QA Publish

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to publish from"
        required: true
        type: string
      issue_ref:
        description: "Optional issue ref override, e.g. erniesg/tong#49"
        required: false
        type: string
      run_dir:
        description: "Optional repo-visible run directory override"
        required: false
        type: string
      route:
        description: "Optional route metadata override"
        required: false
        type: string
      scenario_seed:
        description: "Optional scenario seed metadata override"
        required: false
        type: string
      checkpoint_id:
        description: "Optional checkpoint id metadata override"
        required: false
        type: string
      qa_recipe:
        description: "Optional CI QA recipe id override"
        required: false
        type: string
      no_auto_evidence_upload:
        description: "Skip auto evidence upload and publish the plain markdown draft"
        required: false
        type: boolean
        default: false
      force:
        description: "Force publish even if the publish policy would otherwise skip it"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Render and validate the request without posting a GitHub comment"
        required: false
        type: boolean
        default: false
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  resolve:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/qa-publish'))
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      reason: ${{ steps.resolve.outputs.reason }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pr_url: ${{ steps.resolve.outputs.pr_url }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      head_repo: ${{ steps.resolve.outputs.head_repo }}
      base_repo: ${{ steps.resolve.outputs.base_repo }}
      same_repo: ${{ steps.resolve.outputs.same_repo }}
      issue_ref: ${{ steps.resolve.outputs.issue_ref }}
      run_dir: ${{ steps.resolve.outputs.run_dir }}
      route: ${{ steps.resolve.outputs.route }}
      scenario_seed: ${{ steps.resolve.outputs.scenario_seed }}
      checkpoint_id: ${{ steps.resolve.outputs.checkpoint_id }}
      qa_recipe: ${{ steps.resolve.outputs.qa_recipe }}
      no_auto_evidence_upload: ${{ steps.resolve.outputs.no_auto_evidence_upload }}
      force: ${{ steps.resolve.outputs.force }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/resolve_qa_publish_request.mjs
      - name: Summary
        run: |
          {
            echo "## QA Publish Resolution"
            echo
            echo "- should_run: \`${{ steps.resolve.outputs.should_run }}\`"
            echo "- reason: ${{ steps.resolve.outputs.reason }}"
            echo "- pr_number: \`${{ steps.resolve.outputs.pr_number }}\`"
            echo "- issue_ref: \`${{ steps.resolve.outputs.issue_ref }}\`"
            echo "- run_dir: \`${{ steps.resolve.outputs.run_dir }}\`"
            echo "- route: \`${{ steps.resolve.outputs.route }}\`"
            echo "- scenario_seed: \`${{ steps.resolve.outputs.scenario_seed }}\`"
            echo "- checkpoint_id: \`${{ steps.resolve.outputs.checkpoint_id }}\`"
            echo "- qa_recipe: \`${{ steps.resolve.outputs.qa_recipe }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  blocked:
    needs: resolve
    if: needs.resolve.outputs.should_run != 'true' && github.event_name == 'issue_comment' && needs.resolve.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Comment blocker
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ needs.resolve.outputs.pr_number }}" --repo "${{ github.repository }}" --body "$(cat <<'EOF'
          Trusted QA publish did not start.

          Reason: ${{ needs.resolve.outputs.reason }}

          Supported triggers:
          - Comment `/qa-publish` on a same-repo PR as a maintainer
          - Run the `Trusted QA Publish` workflow manually with `pr_number`
          EOF
          )"

  publish:
    needs: resolve
    if: needs.resolve.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TONG_RUNS_R2_BUCKET: ${{ vars.TONG_RUNS_R2_BUCKET }}
      TONG_RUNS_PUBLIC_BASE_URL: ${{ vars.TONG_RUNS_PUBLIC_BASE_URL }}
      NEXT_PUBLIC_TONG_ASSETS_BASE_URL: ${{ vars.NEXT_PUBLIC_TONG_ASSETS_BASE_URL }}
      TONG_ASSETS_R2_BUCKET: ${{ vars.TONG_ASSETS_R2_BUCKET }}
      TONG_RUNTIME_ASSET_MANIFEST_KEY: ${{ vars.TONG_RUNTIME_ASSET_MANIFEST_KEY }}
      QA_BASE_URL: http://127.0.0.1:3000
      QA_API_BASE_URL: http://127.0.0.1:8787
    steps:
      - name: Block fork PRs
        if: needs.resolve.outputs.same_repo != 'true'
        run: |
          gh pr comment "${{ needs.resolve.outputs.pr_number }}" --repo "${{ github.repository }}" --body "$(cat <<'EOF'
          Trusted QA publish was blocked.

          This workflow only runs secret-bearing publish/upload steps for same-repo PRs. Fork PRs are intentionally blocked from using Cloudflare and GitHub publish credentials.
          EOF
          )"
          exit 1

      - uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.head_repo }}
          ref: ${{ needs.resolve.outputs.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/client/package-lock.json
            apps/server/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get install -y gh
          fi

      - name: Install app dependencies
        run: |
          npm --prefix apps/server ci
          npm --prefix apps/client ci

      - name: Reviewer-proof preflight
        run: npm run qa:preflight-reviewer-proof

      - name: Check requested run bundle
        id: run_dir
        run: |
          if [ -n "${{ needs.resolve.outputs.run_dir }}" ] && [ -d "${{ needs.resolve.outputs.run_dir }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install recipe runtime dependencies
        if: needs.resolve.outputs.qa_recipe != '' && steps.run_dir.outputs.exists != 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Prime QA data
        if: needs.resolve.outputs.qa_recipe != '' && steps.run_dir.outputs.exists != 'true'
        run: |
          npm run demo:smoke
          npm run ingest:mock

      - name: Start local QA services
        if: needs.resolve.outputs.qa_recipe != '' && steps.run_dir.outputs.exists != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/tong-services"
          PORT=8787 TONG_DEMO_PASSWORD=TONG-DEMO-ACCESS npm --prefix apps/server run start >"$RUNNER_TEMP/tong-services/server.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/tong-services/server.pid"
          NEXT_PUBLIC_TONG_API_BASE="$QA_API_BASE_URL" \
          NEXT_PUBLIC_TONG_DEMO_PASSWORD_HINT="Use the demo access password provided by the Tong team." \
          npm --prefix apps/client run dev -- -p 3000 >"$RUNNER_TEMP/tong-services/client.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/tong-services/client.pid"
          for url in "$QA_API_BASE_URL/health" "$QA_BASE_URL"; do
            for _ in $(seq 1 90); do
              if curl -fsS "$url" >/dev/null 2>&1; then
                break
              fi
              sleep 1
            done
            curl -fsS "$url" >/dev/null
          done

      - name: Generate CI run bundle from recipe
        id: recipe
        if: needs.resolve.outputs.qa_recipe != '' && steps.run_dir.outputs.exists != 'true'
        run: |
          run_dir="$(node scripts/run_qa_publish_recipe.mjs \
            --recipe "${{ needs.resolve.outputs.qa_recipe }}" \
            --issue-ref "${{ needs.resolve.outputs.issue_ref }}" \
            --route "${{ needs.resolve.outputs.route }}" \
            --scenario-seed "${{ needs.resolve.outputs.scenario_seed }}" \
            --checkpoint-id "${{ needs.resolve.outputs.checkpoint_id }}" \
            --base-url "$QA_BASE_URL")"
          echo "run_dir=$run_dir" >> "$GITHUB_OUTPUT"

      - name: Select effective run bundle
        id: effective_run
        run: |
          if [ "${{ steps.run_dir.outputs.exists }}" = "true" ]; then
            echo "run_dir=${{ needs.resolve.outputs.run_dir }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ steps.recipe.outputs.run_dir }}" ]; then
            echo "run_dir=${{ steps.recipe.outputs.run_dir }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_dir=" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment missing run bundle
        if: steps.effective_run.outputs.run_dir == ''
        run: |
          gh pr comment "${{ needs.resolve.outputs.pr_number }}" --repo "${{ github.repository }}" --body "$(cat <<'EOF'
          Trusted QA publish could not find a repo-visible run bundle to publish.

          Request metadata:
          - Issue: `${{ needs.resolve.outputs.issue_ref }}`
          - Route: `${{ needs.resolve.outputs.route }}`
          - Scenario seed: `${{ needs.resolve.outputs.scenario_seed }}`
          - Checkpoint id: `${{ needs.resolve.outputs.checkpoint_id }}`
          - Requested run dir: `${{ needs.resolve.outputs.run_dir }}`
          - QA recipe: `${{ needs.resolve.outputs.qa_recipe }}`

          Current limitation:
          - `artifacts/qa-runs/...` is gitignored local staging, so Codex cloud task bundles are not automatically present in this GitHub Actions checkout.
          - This trusted workflow can publish/upload only when the run bundle is repo-visible in the checked-out branch or when a matching CI QA recipe can regenerate the run in CI.

          Next options:
          1. Add a supported `qa_recipe` to the PR metadata so CI can regenerate the run bundle.
          2. Re-run validation in a trusted environment that can regenerate the run bundle.
          3. Publish the paste-ready markdown from the Codex task manually.
          EOF
          )"
          exit 1

      - name: Publish trusted QA update
        run: |
          args=(python3 .agents/skills/_functional-qa/scripts/qa_runtime.py publish-github --run-dir "${{ steps.effective_run.outputs.run_dir }}")
          if [ "${{ needs.resolve.outputs.no_auto_evidence_upload }}" = "true" ]; then
            args+=(--no-auto-evidence-upload)
          fi
          if [ "${{ needs.resolve.outputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          if [ "${{ needs.resolve.outputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          "${args[@]}"

      - name: Step summary
        if: always()
        run: |
          {
            echo "## Trusted QA Publish"
            echo
            echo "- PR: #${{ needs.resolve.outputs.pr_number }}"
            echo "- Issue: \`${{ needs.resolve.outputs.issue_ref }}\`"
            echo "- Run dir: \`${{ steps.effective_run.outputs.run_dir }}\`"
            echo "- Route: \`${{ needs.resolve.outputs.route }}\`"
            echo "- Scenario seed: \`${{ needs.resolve.outputs.scenario_seed }}\`"
            echo "- Checkpoint id: \`${{ needs.resolve.outputs.checkpoint_id }}\`"
            echo "- QA recipe: \`${{ needs.resolve.outputs.qa_recipe }}\`"
            echo "- Dry run: \`${{ needs.resolve.outputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop local QA services
        if: always() && needs.resolve.outputs.qa_recipe != ''
        run: |
          if [ -f "$RUNNER_TEMP/tong-services/server.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/tong-services/server.pid")" >/dev/null 2>&1 || true
          fi
          if [ -f "$RUNNER_TEMP/tong-services/client.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/tong-services/client.pid")" >/dev/null 2>&1 || true
          fi
