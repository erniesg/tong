name: Codex Headless PR

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Codex prompt describing the requested implementation"
        required: true
        type: string
      base_branch:
        description: "Base branch for the generated PR"
        required: false
        type: string
        default: "main"
      branch:
        description: "Head branch for the generated PR (must start with codex/)"
        required: true
        type: string
      pr_title:
        description: "Pull request title"
        required: true
        type: string
      pr_body:
        description: "Optional PR body preamble"
        required: false
        type: string
      issue_ref:
        description: "Optional issue ref, e.g. erniesg/tong#49"
        required: false
        type: string
      route:
        description: "Optional QA route metadata"
        required: false
        type: string
      scenario_seed:
        description: "Optional QA scenario seed metadata"
        required: false
        type: string
      checkpoint_id:
        description: "Optional QA checkpoint metadata"
        required: false
        type: string
      qa_recipe:
        description: "Optional CI QA recipe, e.g. haeun_fresh_demo"
        required: false
        type: string
      no_auto_evidence_upload:
        description: "Skip automatic evidence upload in trusted QA publish"
        required: false
        type: boolean
        default: false
      auto_qa_publish:
        description: "Explicitly dispatch trusted QA publish after PR creation"
        required: false
        type: boolean
        default: true
      codex_args:
        description: "Optional extra codex exec args"
        required: false
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  codex:
    runs-on: ubuntu-latest
    outputs:
      pull_request_number: ${{ steps.cpr.outputs.pull-request-number }}
      pull_request_url: ${{ steps.cpr.outputs.pull-request-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}

      - name: Prime repo context
        run: |
          npm --prefix apps/server ci
          npm --prefix apps/client ci
          npm run demo:smoke
          npm run ingest:mock

      - name: Run Codex
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Repository: ${{ github.repository }}
            Base branch: ${{ inputs.base_branch }}
            Issue ref: ${{ inputs.issue_ref }}

            Task:
            ${{ inputs.prompt }}
          codex-args: ${{ inputs.codex_args }}
          sandbox: workspace-write

      - name: Write PR body
        id: pr_body
        env:
          INPUT_PR_TITLE: ${{ inputs.pr_title }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_PR_BODY: ${{ inputs.pr_body }}
          INPUT_ISSUE_REF: ${{ inputs.issue_ref }}
          INPUT_ROUTE: ${{ inputs.route }}
          INPUT_SCENARIO_SEED: ${{ inputs.scenario_seed }}
          INPUT_CHECKPOINT_ID: ${{ inputs.checkpoint_id }}
          INPUT_QA_RECIPE: ${{ inputs.qa_recipe }}
          INPUT_NO_AUTO_EVIDENCE_UPLOAD: ${{ inputs.no_auto_evidence_upload }}
        run: node scripts/write_pr_body_with_qa_request.mjs --body-path "$RUNNER_TEMP/pr-body.md"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr_title }}
          body-path: ${{ runner.temp }}/pr-body.md
          branch: ${{ inputs.branch }}
          base: ${{ inputs.base_branch }}
          delete-branch: false

      - name: Dispatch trusted QA publish
        if: inputs.auto_qa_publish && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run qa-publish.yml --repo "${{ github.repository }}" -f pr_number="${{ steps.cpr.outputs.pull-request-number }}"

      - name: Step summary
        if: always()
        run: |
          {
            echo "## Codex Headless PR"
            echo
            echo "- PR: ${{ steps.cpr.outputs.pull-request-url }}"
            echo "- Issue ref: \`${{ steps.pr_body.outputs.issue_ref }}\`"
            echo "- Route: \`${{ steps.pr_body.outputs.route }}\`"
            echo "- Scenario seed: \`${{ steps.pr_body.outputs.scenario_seed }}\`"
            echo "- QA recipe: \`${{ steps.pr_body.outputs.qa_recipe }}\`"
            echo "- Auto QA publish: \`${{ inputs.auto_qa_publish }}\`"
            echo "- Codex final message present: \`${{ steps.codex.outputs.final_message != '' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
