name: Design System Audit

on:
  push:
    branches: [main, 'feat/*']
    paths:
      - 'apps/client/app/globals.css'
      - 'apps/client/scripts/design-system/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/client/app/globals.css'
      - 'apps/client/scripts/design-system/**'

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/client/package-lock.json
      - run: npm ci
      - run: npm run ds:build
      - run: npm run ds:audit
