name: Trusted Codex Create PR

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Base branch to apply the patch onto"
        required: false
        type: string
        default: "main"
      new_branch:
        description: "New codex/* branch name"
        required: true
        type: string
      pr_title:
        description: "Pull request title"
        required: true
        type: string
      commit_message:
        description: "Optional commit message override"
        required: false
        type: string
      issue_ref:
        description: "Optional issue ref, e.g. erniesg/tong#49"
        required: false
        type: string
      pr_body:
        description: "Optional PR body preamble"
        required: false
        type: string
      patch_text:
        description: "Inline git diff/patch text"
        required: false
        type: string
      patch_url:
        description: "URL to a raw patch file"
        required: false
        type: string
      patch_path:
        description: "Repo-visible path to a committed patch file"
        required: false
        type: string
      run_dir:
        description: "Optional repo-visible QA run directory"
        required: false
        type: string
      route:
        description: "Optional route metadata for QA publish"
        required: false
        type: string
      scenario_seed:
        description: "Optional scenario seed metadata"
        required: false
        type: string
      checkpoint_id:
        description: "Optional checkpoint id metadata"
        required: false
        type: string
      qa_recipe:
        description: "Optional CI QA recipe id"
        required: false
        type: string
      no_auto_evidence_upload:
        description: "Skip evidence upload during trusted QA publish"
        required: false
        type: boolean
        default: false
      auto_qa_publish:
        description: "Explicitly dispatch trusted QA publish after PR creation"
        required: false
        type: boolean
        default: true
      dry_run:
        description: "Validate patch application without pushing or creating a PR"
        required: false
        type: boolean
        default: false
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  create:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/codex-create-pr'))
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      reason: ${{ steps.resolve.outputs.reason }}
      pr_number: ${{ steps.create.outputs.pr_number }}
      pr_url: ${{ steps.create.outputs.pr_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: resolve
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          REQUEST_PATCH_PATH: ${{ runner.temp }}/codex-request.patch
          REQUEST_PR_BODY_PATH: ${{ runner.temp }}/codex-pr-body.md
        run: node scripts/resolve_codex_create_pr_request.mjs

      - name: Comment blocker
        if: steps.resolve.outputs.should_run != 'true' && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "$(cat <<'EOF'
          Trusted Codex PR creation did not start.

          Reason: ${{ steps.resolve.outputs.reason }}

          Supported inputs:
          - `workflow_dispatch` with patch_text, patch_url, or patch_path
          - an issue comment starting with `/codex-create-pr`, a `## Codex PR Request` JSON block, and a fenced ```diff block
          EOF
          )"

      - name: Stop when request is invalid
        if: steps.resolve.outputs.should_run != 'true'
        run: exit 1

      - name: Prepare patch file
        id: patch
        run: |
          set -euo pipefail
          patch_file="${RUNNER_TEMP}/codex-apply.patch"
          case "${{ steps.resolve.outputs.patch_source }}" in
            inline)
              cp "${RUNNER_TEMP}/codex-request.patch" "$patch_file"
              ;;
            url)
              curl -fsSL "${{ steps.resolve.outputs.patch_url }}" -o "$patch_file"
              ;;
            path)
              cp "${{ steps.resolve.outputs.patch_path }}" "$patch_file"
              ;;
            *)
              echo "Unsupported patch source: ${{ steps.resolve.outputs.patch_source }}" >&2
              exit 1
              ;;
          esac
          echo "patch_file=$patch_file" >> "$GITHUB_OUTPUT"

      - name: Apply patch
        run: |
          set -euo pipefail
          git fetch origin "${{ steps.resolve.outputs.base_branch }}"
          git checkout -B "${{ steps.resolve.outputs.new_branch }}" "origin/${{ steps.resolve.outputs.base_branch }}"
          git apply --3way --index "${{ steps.patch.outputs.patch_file }}"

      - name: Dry-run summary
        if: steps.resolve.outputs.dry_run == 'true'
        run: |
          {
            echo "## Trusted Codex Create PR"
            echo
            echo "- Dry run: \`true\`"
            echo "- Base branch: \`${{ steps.resolve.outputs.base_branch }}\`"
            echo "- New branch: \`${{ steps.resolve.outputs.new_branch }}\`"
            echo "- Patch source: \`${{ steps.resolve.outputs.patch_source }}\`"
            echo "- Patch applied successfully in dry-run mode."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create branch commit and PR
        id: create
        if: steps.resolve.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo "Patch applied but produced no staged changes." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "${{ steps.resolve.outputs.commit_message }}"
          git push --set-upstream origin "${{ steps.resolve.outputs.new_branch }}"
          gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ steps.resolve.outputs.base_branch }}" \
            --head "${{ steps.resolve.outputs.new_branch }}" \
            --title "${{ steps.resolve.outputs.pr_title }}" \
            --body-file "${RUNNER_TEMP}/codex-pr-body.md"
          pr_json="$(gh pr view "${{ steps.resolve.outputs.new_branch }}" --repo "${{ github.repository }}" --json number,url)"
          pr_number="$(printf '%s' "$pr_json" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data[\"number\"])')"
          pr_url="$(printf '%s' "$pr_json" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data[\"url\"])')"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Comment PR link back to source issue
        if: steps.resolve.outputs.dry_run != 'true' && steps.resolve.outputs.source_issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ steps.resolve.outputs.source_issue_number }}" --repo "${{ github.repository }}" --body "Trusted Codex PR created: ${{ steps.create.outputs.pr_url }}"

      - name: Dispatch trusted QA publish
        if: steps.resolve.outputs.dry_run != 'true' && steps.resolve.outputs.auto_qa_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run qa-publish.yml --repo "${{ github.repository }}" -f pr_number="${{ steps.create.outputs.pr_number }}"

      - name: Step summary
        if: always()
        run: |
          {
            echo "## Trusted Codex Create PR"
            echo
            echo "- Should run: \`${{ steps.resolve.outputs.should_run }}\`"
            echo "- Reason: ${{ steps.resolve.outputs.reason }}"
            echo "- Base branch: \`${{ steps.resolve.outputs.base_branch }}\`"
            echo "- New branch: \`${{ steps.resolve.outputs.new_branch }}\`"
            echo "- Patch source: \`${{ steps.resolve.outputs.patch_source }}\`"
            echo "- PR: ${{ steps.create.outputs.pr_url }}"
            echo "- Auto QA publish: \`${{ steps.resolve.outputs.auto_qa_publish }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
